user:
  name: "Alex"
  fitness_level: "advanced"
  dietary_restrictions:
    - "vegetarian"
  protein_target_g: 40
  max_driving_minutes: 90
  max_restaurant_radius_miles: 10.0
  home_coordinates: [37.7749, -122.4194]
  preferred_activities:
    - "hiking"
    - "biking"

family:
  vehicle_count: 1
  max_total_driving_minutes: 180
  members:
    - name: "Sarah"
      age: 42
      interests: ["reading", "cafes", "moderate walking"]
      comfort_distance_miles: 3.0
      requires_cell_service: false
    - name: "Emma"
      age: 17
      interests: ["photography", "music", "social media"]
      comfort_distance_miles: 2.0
      requires_cell_service: true
    - name: "Jake"
      age: 12
      interests: ["video games", "swimming", "adventure"]
      comfort_distance_miles: 4.0
      requires_cell_service: false

models:
  local_model: "qwen3.5:9b"
  cloud_agents:
    enabled: false
    model: "qwen3.5:cloud"
    agents: []

ollama:
  base_url: "http://localhost:11434"

tools:
  providers:
    weather: "open_meteo"
    activity: "overpass"
    places: "yelp"
    routing: "osrm"

planning:
  max_iterations: 3
  default_search_radius_miles: 50.0
  # Weather thresholds — raise to accept worse conditions, lower to be stricter.
  precipitation_threshold_pct: 40
  aqi_threshold: 100
  min_sunset_buffer_minutes: 30
  # Cell coverage: distance (miles) from nearest road below which coverage is assumed.
  # 1.0 covers most PNW trailheads. Set to 0.0 to disable the constraint entirely.
  cell_coverage_road_proximity_miles: 1.0
  # Set true only if a teen family member should also enforce cell coverage
  # (in addition to members who have requires_cell_service: true individually).
  require_teen_cell_service: false
  # Logistics: set earliest_departure_hour: 0 to allow pre-dawn starts.
  earliest_departure_hour: 6
  # Set max_day_hours: 24 to effectively disable the day-length check.
  max_day_hours: 12.0
  # Restaurant search radius from the activity endpoint.
  # Raise to 30+ for remote trailheads where you'll stop in a town on the way home.
  restaurant_search_radius_miles: 10.0
  # Safety: precip % at or above which hospital proximity is also checked (family plans).
  # Set to 100 to skip the hospital check entirely.
  marginal_weather_precip_pct: 30
  # Safety: radius for hospital proximity check when weather is marginal.
  hospital_search_radius_miles: 30.0
  # Number of activity candidates the LLM sees and ranks. More = more variety.
  max_candidate_activities: 20
